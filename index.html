<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汽水音乐解析下载工具</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="app-title-row">
                <svg class="app-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                </svg>
                <div class="app-title-group">
                    <h1 class="app-title">汽水音乐解析下载工具</h1>
                    <p class="app-description">支持多平台音乐资源解析下载</p>
                </div>
            </div>
        </header>

        <main class="app-main">
            <section class="link-input-section">
                <div class="input-group">
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                        </svg>
                        <input type="text" id="musicLink" class="music-link-input" placeholder="粘贴音乐分享链接" autocomplete="off">
                    </div>
                    <button type="button" id="parseButton" class="parse-button">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        <span>解析</span>
                    </button>
                </div>
            </section>

            <section class="parse-status-section" aria-live="polite">
                <div id="parseStatus" class="parse-status hidden">
                    <svg class="status-spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    </svg>
                    <span class="status-text">解析中...</span>
                </div>
            </section>

            <section class="music-info-section hidden" aria-label="音乐信息">
                <div class="music-info-container">
                    <div class="music-cover">
                        <img src="" alt="" id="musicCover">
                        <div class="cover-placeholder">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 18V5l12-2v13"/>
                                <circle cx="6" cy="18" r="3"/>
                                <circle cx="18" cy="16" r="3"/>
                            </svg>
                        </div>
                    </div>
                    <div class="music-details">
                        <h2 class="music-title" id="musicTitle"></h2>
                        <p class="music-artist" id="musicArtist"></p>
                        <p class="music-album" id="musicAlbum"></p>
                        <div class="audio-player">
                            <audio id="musicPlayer" controls referrerpolicy="no-referrer">
                                <source src="" type="audio/mpeg">
                            </audio>
                        </div>
                    </div>
                    <div class="download-action">
                        <button type="button" class="download-button" id="downloadButton">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            <span>下载</span>
                        </button>
                    </div>
                </div>
            </section>

            <div class="bottom-panels">
                <section class="download-manager-section" aria-label="下载管理">
                    <h2 class="section-title">下载管理</h2>
                    <div class="download-list" id="downloadList">
                        <template id="downloadItemTemplate">
                            <div class="download-item">
                                <div class="download-item-info">
                                    <span class="download-name"></span>
                                    <span class="download-size"></span>
                                </div>
                                <div class="download-progress">
                                    <div class="progress-bar">
                                        <div class="progress-fill"></div>
                                    </div>
                                    <span class="progress-text"></span>
                                </div>
                                <div class="download-actions">
                                    <button class="control-button pause-button" aria-label="暂停">
                                        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                                            <rect x="6" y="4" width="4" height="16"/>
                                            <rect x="14" y="4" width="4" height="16"/>
                                        </svg>
                                    </button>
                                    <button class="control-button cancel-button" aria-label="取消">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                            <line x1="18" y1="6" x2="6" y2="18"/>
                                            <line x1="6" y1="6" x2="18" y2="18"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div class="empty-state" id="downloadEmpty">
                        <p>暂无下载任务</p>
                    </div>
                </section>

                <section class="history-section" aria-label="下载历史">
                    <div class="section-header">
                        <h2 class="section-title">下载历史</h2>
                        <button type="button" class="clear-history-button" id="clearHistoryButton">清空历史</button>
                    </div>
                    <div class="history-list" id="historyList"></div>
                    <div class="empty-state" id="historyEmpty">
                        <p>暂无下载记录</p>
                    </div>
                </section>
            </div>
        </main>

        <footer class="app-footer">
            <p>汽水音乐解析下载工具</p>
        </footer>
    </div>

    <script src="js/main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var hl = document.getElementById('historyList');
            var he = document.getElementById('historyEmpty');
            var dl = document.getElementById('downloadList');
            var de = document.getElementById('downloadEmpty');
            if (hl && he && hl.children.length === 0) he.style.display = 'flex';
            if (dl && de && dl.querySelectorAll('.download-item').length === 0) de.style.display = 'flex';
        });
    </script>
</body>

</html>
